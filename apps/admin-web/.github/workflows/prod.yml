name: Admin Web CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/admin-web/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'apps/admin-web/**'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/admin-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
